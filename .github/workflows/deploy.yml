name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
  workflow_dispatch:
    inputs:
      component:
        description: "Component to build (backend, frontend, both)"
        required: true
        default: "both"
        type: choice
        options: [backend, frontend, both]
      environment:
        description: "Deploy target"
        required: true
        default: "staging"
        type: choice
        options: [staging, production]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend

jobs:
  # =========================================================================
  # Detect changes (auto-push only)
  # =========================================================================
  changes:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # =========================================================================
  # Build & Push Backend Image
  # =========================================================================
  build-backend:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && needs.changes.outputs.backend == 'true') ||
      (github.event_name == 'workflow_dispatch' && contains(fromJSON('["backend","both"]'), inputs.component))
    needs: [changes]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =========================================================================
  # Build & Push Frontend Image
  # =========================================================================
  build-frontend:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && needs.changes.outputs.frontend == 'true') ||
      (github.event_name == 'workflow_dispatch' && contains(fromJSON('["frontend","both"]'), inputs.component))
    needs: [changes]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =========================================================================
  # Deploy to Staging
  # =========================================================================
  deploy-staging:
    needs: [build-backend, build-frontend]
    if: |
      always() &&
      !cancelled() &&
      (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success') &&
      (github.event_name == 'push' || inputs.environment == 'staging')
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd ${{ secrets.STAGING_DEPLOY_PATH }}/docker
            docker compose -f docker-compose.yml -f docker-compose.staging.yml -f docker-compose.ow-staging.yml pull ow-app ow-frontend
            docker compose -f docker-compose.yml -f docker-compose.staging.yml -f docker-compose.ow-staging.yml up -d ow-app ow-celery-worker ow-celery-beat ow-frontend
            docker image prune -f

  # =========================================================================
  # Deploy to Production (manual only)
  # =========================================================================
  deploy-production:
    needs: [build-backend, build-frontend]
    if: |
      always() &&
      !cancelled() &&
      (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success') &&
      github.event_name == 'workflow_dispatch' && inputs.environment == 'production'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd ${{ secrets.PRODUCTION_DEPLOY_PATH }}/docker
            docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.ow-prod.yml pull ow-app ow-frontend
            docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.ow-prod.yml up -d ow-app ow-celery-worker ow-celery-beat ow-frontend
            docker image prune -f
